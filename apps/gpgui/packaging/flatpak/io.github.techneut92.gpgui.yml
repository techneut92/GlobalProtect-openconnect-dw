# Flatpak manifest for the gpgui front-end.
#
# IMPORTANT — this packages the **GUI only**. The privileged backend
# (gpservice + openconnect + tun) cannot be sandboxed; it ships as a host
# .deb/.rpm/.apk and is reached over D-Bus (`--system-talk-name` below). The
# in-app "backend not installed" screen guides the host install.
#
# Smart-card / YubiKey notes:
#   * `--socket=pcsc` bridges the host pcscd into the sandbox, so the YubiKey is
#     read by the host (no USB passthrough). This is what makes PKCS#11 work.
#   * The runtime has no opensc, so we bundle pcsc-lite (client lib) + opensc.
#     The bundled module lands at /app/lib/pkcs11/opensc-pkcs11.so, which
#     gpgui's module picker includes.
#
# Build with `apps/gpgui/packaging/flatpak/flatpak-build.sh`, which installs the
# runtime/SDK, vendors the cargo registry (regenerates `cargo-sources.json` for
# the offline build), and runs flatpak-builder.
app-id: io.github.techneut92.gpgui
runtime: org.gnome.Platform
runtime-version: '50'
sdk: org.gnome.Sdk
sdk-extensions:
  - org.freedesktop.Sdk.Extension.rust-stable
command: gpgui

finish-args:
  - --share=ipc
  - --socket=wayland
  - --socket=fallback-x11
  - --device=dri
  # webkit2gtk's DMABUF renderer crashes on some Wayland + Mesa setups.
  - --env=WEBKIT_DISABLE_DMABUF_RENDERER=1
  # Update check hits the GitHub Releases API.
  - --share=network
  # Smart card: talk to the host pcscd (YubiKey PIV).
  - --socket=pcsc
  # The root backend, over the system bus.
  - --system-talk-name=io.github.techneut92.GPService
  # "Remember unlock" — store the master PIN in the desktop secret store.
  - --talk-name=org.freedesktop.secrets
  # Desktop integration: notifications + system-tray (SNI).
  - --talk-name=org.freedesktop.Notifications
  - --talk-name=org.kde.StatusNotifierWatcher
  # Portals: file chooser (cert-file auth) + OpenURI (system-browser SSO).
  - --talk-name=org.freedesktop.portal.Desktop
  # Run host commands (flatpak update / pkexec backend install / xdg-open) via
  # flatpak-spawn --host.
  - --talk-name=org.freedesktop.Flatpak
  # Write the host autostart entry and the Pop Shell float-rule (best-effort).
  - --filesystem=xdg-config/autostart:create
  - --filesystem=xdg-config/pop-shell:create

modules:
  # libpcsclite client (to reach host pcscd via --socket=pcsc). The client/socket
  # protocol is stable, so an older release is fine against a newer host pcscd.
  - name: pcsc-lite
    buildsystem: meson
    config-opts:
      - -Dlibsystemd=false
      - -Dlibudev=false
      - -Dpolkit=false
    # Ship the BSD-3-Clause license text with the bundled binary. meson builds
    # out-of-tree in _flatpak_build/, so COPYING is one directory up.
    post-install:
      - install -Dm644 ../COPYING /app/share/licenses/pcsc-lite/COPYING
    sources:
      # Git tag rather than the apdu.fr tarball: that server keeps only the
      # latest two releases, so a pinned tarball 404s on the next release (it
      # just did, breaking the build). pcsc-lite uses meson since 2.x, which
      # builds straight from a git checkout — and tags don't disappear.
      - type: git
        url: https://salsa.debian.org/rousseau/PCSC.git
        tag: '2.5.1'
        commit: 5b93c58217f3633800264f68054f58c211090b45

  # opensc — provides /app/lib/pkcs11/opensc-pkcs11.so
  - name: opensc
    config-opts:
      - --disable-static
    # GCC 14 (fdo 25.08 SDK) promotes several legacy-C warnings to errors; opensc
    # 0.26.0 still trips them, so don't treat warnings as errors.
    build-options:
      cflags: -Wno-error
    # bash-completion's pkg-config dir resolves to the read-only /usr; redirect it
    # into the app prefix.
    make-install-args:
      - completiondir=/app/share/bash-completion/completions
    # Ship the LGPL-2.1+ license text with the bundled module.
    post-install:
      - install -Dm644 COPYING /app/share/licenses/opensc/COPYING
    sources:
      - type: archive
        url: https://github.com/OpenSC/OpenSC/releases/download/0.26.0/opensc-0.26.0.tar.gz
        sha256: 837baead45e1505260d868871056150ede6e73d35460a470f2595a9e5e75f82b

  - name: gpgui
    buildsystem: simple
    build-options:
      append-path: /usr/lib/sdk/rust-stable/bin
      env:
        CARGO_HOME: /run/build/gpgui/cargo
        # Resolve the auth helper inside the sandbox, not /usr/bin.
        GP_AUTH_BINARY: /app/bin/gpauth
        # Baked into the binary so About shows the build kind unambiguously.
        GP_BUILD_KIND: flatpak
    build-commands:
      - cargo build --release -p gpgui -p gpauth --offline
      - install -Dm755 target/release/gpgui /app/bin/gpgui
      # Bundle gpauth (unprivileged SAML helper) for embedded-webview SSO.
      - install -Dm755 target/release/gpauth /app/bin/gpauth
      - install -Dm644 apps/gpgui/packaging/flatpak/io.github.techneut92.gpgui.desktop /app/share/applications/io.github.techneut92.gpgui.desktop
      - install -Dm644 apps/gpgui/packaging/flatpak/io.github.techneut92.gpgui.metainfo.xml /app/share/metainfo/io.github.techneut92.gpgui.metainfo.xml
      - install -Dm644 apps/gpgui/icons/128x128.png /app/share/icons/hicolor/128x128/apps/io.github.techneut92.gpgui.png
      # GPL-3.0 license text for this app (a fork of yuezk/GlobalProtect-openconnect).
      - install -Dm644 apps/gpgui/LICENSE /app/share/licenses/io.github.techneut92.gpgui/COPYING
    sources:
      - type: dir
        # Repo root (four levels up from this manifest). Skip heavy/irrelevant
        # trees so the sandbox copy stays small.
        path: ../../../../
        skip:
          - target
          - .git
          - .flatpak-builder
          - build-flatpak
      # Vendored crate registry for the offline build (generated; see header).
      - cargo-sources.json

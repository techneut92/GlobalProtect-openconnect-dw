<!DOCTYPE busconfig PUBLIC
 "-//freedesktop//DTD D-BUS Bus Configuration 1.0//EN"
 "http://www.freedesktop.org/standards/dbus/1.0/busconfig.dtd">
<!-- System-bus policy for gpservice. Installed to /usr/share/dbus-1/system.d/.
     Only root may own/run the service; any client may call it, but the methods
     themselves are gated by polkit (io.github.techneut92.gpservice.manage) so that only an
     active local user is authorised. -->
<busconfig>
  <policy user="root">
    <allow own="io.github.techneut92.GPService"/>
  </policy>

  <policy context="default">
    <allow send_destination="io.github.techneut92.GPService"/>
    <allow receive_sender="io.github.techneut92.GPService"/>
  </policy>
</busconfig>

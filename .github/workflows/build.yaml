name: Build
on:
  workflow_dispatch:
    inputs:
      gp_branch:
        description: 'GlobalProtect-openconnect branch to use for the snapshot release'
        required: true
        default: dev
  push:
    paths-ignore:
      - LICENSE
      - "*.md"
      - .vscode
      - .devcontainer
    branches:
      - main
      - hotfix/*
      - feature/*
      - release/*
    tags:
      - v*.*.*

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

# The built-in GITHUB_TOKEN is used (no GH_PAT secret needed); it needs write
# access to create the GitHub release and upload package assets.
permissions:
  contents: write

jobs:
  setup-matrix:
    runs-on: ubuntu-latest
    outputs:
      matrix: ${{ steps.set-matrix.outputs.matrix }}
    steps:
      - name: Set up matrix
        id: set-matrix
        run: |
          echo 'matrix=[{"runner": "ubuntu-latest", "arch": "amd64"}, {"runner": "ubuntu-24.04-arm", "arch": "ubuntu-24.04-arm"}]' >> $GITHUB_OUTPUT

  # Fails if the GUI<->backend wire format (gp-protocol) changed without a
  # deliberate snapshot regen — i.e. a silent protocol drift. An intentional
  # change regenerates the snapshot (and bumps PROTOCOL_MAX); see the test.
  wire-format-guard:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v6
      with:
        submodules: recursive
    - uses: dtolnay/rust-toolchain@stable
    - name: Wire-format guard (protocol drift check)
      run: cargo test -p gp-protocol --test wire_format

  tarball:
    runs-on: ubuntu-latest
    needs: [setup-matrix]
    steps:
    - uses: pnpm/action-setup@v5
      with:
        version: 9
    - name: Prepare workspace
      run: rm -rf source && mkdir -p source/artifacts

    - name: Checkout GlobalProtect-openconnect
      uses: actions/checkout@v6
      with:
        token: ${{ github.token }}
        repository: techneut92/GlobalProtect-openconnect-dw
        ref: ${{ github.event_name == 'workflow_dispatch' && inputs.gp_branch || github.ref }}
        path: source/gp
        submodules: recursive

    - name: Create tarball
      run: |
        cd source/gp
        # Generate the SNAPSHOT file for non-tagged commits
        if [[ "${{ github.ref }}" != "refs/tags/"* ]]; then
          touch SNAPSHOT
        fi
        make tarball

        mv -v .build/tarball/*.tar.gz ../artifacts/

    - name: Generate RPM spec file
      env:
        RELEASE_TAG: ${{ github.event_name == 'workflow_dispatch' && 'snapshot' || github.ref_name }}
      run: |
        cd source/gp

        make init-rpm \
          REVISION='1%{?dist}' \
          RPM_SOURCE=https://github.com/techneut92/GlobalProtect-openconnect-dw/releases/download/${RELEASE_TAG}/%{name}-%{version}.tar.gz

        mv -v .build/rpm/*.spec ../artifacts/

    - name: Upload tarball
      uses: actions/upload-artifact@v7
      with:
        name: artifact-source
        if-no-files-found: error
        path: |
          source/artifacts/*

  tarball-offline:
    if: ${{ github.event_name == 'workflow_dispatch' || startsWith(github.ref, 'refs/tags/') }}
    runs-on: ubuntu-latest
    needs:
    - tarball
    steps:
    - uses: pnpm/action-setup@v5
      with:
        version: 9

    - name: Prepare workspace
      run: rm -rf source-offline && mkdir source-offline

    - name: Download tarball
      uses: actions/download-artifact@v8
      with:
        name: artifact-source
        path: source-offline

    - name: Create offline tarball
      run: |
        cd source-offline

        offline_tarball=$(basename *.tar.gz .tar.gz).offline.tar.gz

        # Extract the tarball
        tar -xzf *.tar.gz

        cd */
        make tarball OFFLINE=1

        # Rename the tarball to .offline.tar.gz
        mv -v .build/tarball/*.tar.gz ../$offline_tarball

    - name: Upload offline tarball
      uses: actions/upload-artifact@v7
      with:
        path: source-offline/*.offline.tar.gz
        name: artifact-source-offline
        if-no-files-found: error

  build-gp:
    needs:
    - setup-matrix
    - tarball
    strategy:
      fail-fast: false
      matrix:
        os: ${{fromJson(needs.setup-matrix.outputs.matrix)}}
        package: [deb, rpm, pkg, apk, binary, ubuntu-rolling]
    runs-on: ${{ matrix.os.runner }}
    name: build-gp (${{ matrix.package }}, ${{ matrix.os.arch }})
    steps:
    - name: Prepare workspace
      run: |
        rm -rf build-gp-${{ matrix.package }}
        mkdir -p build-gp-${{ matrix.package }}
    - name: Download tarball
      uses: actions/download-artifact@v8
      with:
        name: artifact-source
        path: build-gp-${{ matrix.package }}
    # Docker Hub login disabled — the yuezk/gpdev builder images are public and
    # pulled anonymously. Re-enable with DOCKER_HUB_TOKEN/USERNAME secrets if you
    # hit Docker Hub pull rate limits.
    # - name: Docker Login
    #   run: echo ${{ secrets.DOCKER_HUB_TOKEN }} | docker login -u ${{ secrets.DOCKER_HUB_USERNAME }} --password-stdin
    - name: Build ${{ matrix.package }} package in Docker
      # LIBXML2_STATIC is needed to avoid the dynamic linking issue on different distros
      run: |
        docker run --pull=always --rm \
          -e COREPACK_INTEGRITY_KEYS=0 \
          -e LIBXML2_STATIC=1 \
          -v $(pwd)/build-gp-${{ matrix.package }}:/workspace \
          yuezk/gpdev:${{ matrix.package }}-builder-tauri2
    # The in-container "install.sh" smoke-test is dropped: it runs `dpkg -i`/`rpm -i`
    # without dependency resolution in a minimal builder image that lacks our
    # runtime deps (openconnect/opensc/pcsc-lite/webkit/...), so it fails even
    # though the packages are correct. Real apt/dnf installs resolve them (verified
    # locally in a clean Fedora container).
    # Don't upload package for ubuntu-rolling because it's duplicate of deb package
    - name: Upload ${{ matrix.package }} package
      if: ${{ matrix.package != 'ubuntu-rolling' }}
      uses: actions/upload-artifact@v7
      with:
        name: artifact-gp-${{ matrix.package }}-${{ matrix.os.arch }}
        if-no-files-found: error
        path: |
          build-gp-${{ matrix.package }}/artifacts/*

  # Install the freshly built x86_64 RPM in a clean Fedora image, where dnf
  # resolves the real runtime deps (openconnect/opensc/pcsc-lite/webkit/...) —
  # the dependency resolution the dropped in-builder smoke test couldn't do.
  # Also asserts the rpm-ostree-layerable invariants (no scriptlets, /usr-only).
  rpm-install-test:
    needs: build-gp
    runs-on: ubuntu-latest
    container:
      image: registry.fedoraproject.org/fedora:latest
    steps:
    - name: Download RPM artifact (x86_64)
      uses: actions/download-artifact@v8
      with:
        name: artifact-gp-rpm-amd64
        path: rpms
    - name: Install backend + native GUI (dnf resolves deps)
      run: dnf -y install ./rpms/globalprotect-openconnect-dw-*.x86_64.rpm
    - name: Verify the install
      run: |
        set -eux
        command -v gpclient gpservice gpauth gpgui
        gpclient --help >/dev/null
        test -f /usr/share/dbus-1/system-services/io.github.techneut92.GPService.service
        test -f /usr/share/dbus-1/system.d/io.github.techneut92.GPService.conf
        test -f /usr/share/polkit-1/actions/io.github.techneut92.gpservice.policy
        test -f /usr/share/applications/io.github.techneut92.gpgui.desktop
    - name: Atomic-safety checks (must layer cleanly with rpm-ostree)
      run: |
        set -e
        for pkg in globalprotect-openconnect-dw globalprotect-openconnect-dw-gui; do
          if [ -n "$(rpm -q --scripts "$pkg")" ]; then
            echo "::error::$pkg ships install scriptlets — breaks rpm-ostree layering"
            rpm -q --scripts "$pkg"; exit 1
          fi
          if rpm -ql "$pkg" | grep -vE '^/usr/'; then
            echo "::error::$pkg ships files outside /usr — not rpm-ostree friendly"; exit 1
          fi
        done
        echo "OK — no scriptlets, /usr-only: layers cleanly on atomic Fedora"

  # Install the freshly built x86_64 .deb in a clean Ubuntu image, where apt
  # resolves the real runtime deps — the deb counterpart of rpm-install-test.
  deb-install-test:
    needs: build-gp
    runs-on: ubuntu-latest
    container:
      image: ubuntu:latest
    steps:
    - name: Download .deb artifact (amd64)
      uses: actions/download-artifact@v8
      with:
        name: artifact-gp-deb-amd64
        path: debs
    - name: Install backend + native GUI (apt resolves deps)
      run: |
        export DEBIAN_FRONTEND=noninteractive
        apt-get update -qq
        apt-get install -y ./debs/globalprotect-openconnect-dw*amd64.deb
    - name: Verify the install
      run: |
        set -eux
        command -v gpclient gpservice gpauth gpgui
        gpclient --help >/dev/null
        test -f /usr/share/dbus-1/system-services/io.github.techneut92.GPService.service
        test -f /usr/share/dbus-1/system.d/io.github.techneut92.GPService.conf
        test -f /usr/share/polkit-1/actions/io.github.techneut92.gpservice.policy
        test -f /usr/share/applications/io.github.techneut92.gpgui.desktop

  # Publish to Fedora COPR — only after rpm-install-test passes, so a package
  # that fails the smoke test is never published. Release tags only. Builds its
  # own offline SRPM from source and submits it (COPR compiles all 6 chroots).
  copr-publish:
    if: ${{ startsWith(github.ref, 'refs/tags/') }}
    needs:
      - rpm-install-test
    runs-on: ubuntu-latest
    container:
      image: registry.fedoraproject.org/fedora:latest
    env:
      COPR_PROJECT: techneut92/globalprotect-openconnect-dw
    steps:
    - name: Install tooling
      run: |
        dnf -y install --setopt=install_weak_deps=False \
          git rpm-build rpmdevtools cargo make xz tar gzip findutils copr-cli
    - name: Checkout (with submodules)
      uses: actions/checkout@v6
      with:
        submodules: recursive
    - name: Trust the workspace (container checkout)
      run: git config --global --add safe.directory "$GITHUB_WORKSPACE"
    - name: Build offline source RPM
      run: make srpm OFFLINE=1
    - name: Configure copr-cli
      env:
        COPR_CONFIG: ${{ secrets.COPR_CONFIG }}
      run: |
        if [ -z "$COPR_CONFIG" ]; then
          echo "::error::COPR_CONFIG secret is not set — add your ~/.config/copr token block as a repo secret."
          exit 1
        fi
        mkdir -p ~/.config
        printf '%s\n' "$COPR_CONFIG" > ~/.config/copr
        chmod 600 ~/.config/copr
    - name: Submit build to COPR
      run: |
        srpm=$(ls .build/rpm/*.src.rpm)
        echo "Submitting $srpm to $COPR_PROJECT (builds all project chroots)"
        copr-cli build "$COPR_PROJECT" "$srpm"

  build-docker-image:
    # Disabled: builds and pushes a container image to Docker Hub (needs
    # DOCKER_HUB_USERNAME/TOKEN secrets). Re-enable when you set up publishing.
    if: false
    strategy:
      fail-fast: false
      matrix:
        include:
          - runner: ubuntu-latest
            platform: linux/amd64
          - runner: ubuntu-24.04-arm
            platform: linux/arm64
    runs-on: ${{ matrix.runner }}
    steps:
    - name: Prepare
      run: |
        platform=${{ matrix.platform }}
        echo "PLATFORM_PAIR=${platform//\//-}" >> "$GITHUB_ENV"
    - name: Checkout GlobalProtect-openconnect
      uses: actions/checkout@v6
      with:
        token: ${{ github.token }}
        repository: techneut92/GlobalProtect-openconnect-dw
        ref: ${{ github.event_name == 'workflow_dispatch' && inputs.gp_branch || github.ref }}
        submodules: recursive
    - name: Set up Docker Buildx
      uses: docker/setup-buildx-action@v4
    - name: Login to Docker Hub
      uses: docker/login-action@v4
      with:
        username: ${{ secrets.DOCKER_HUB_USERNAME }}
        password: ${{ secrets.DOCKER_HUB_TOKEN }}
    - name: Build and push by digest
      id: build
      uses: docker/build-push-action@v7
      with:
        context: .
        file: packaging/docker/alpine/Dockerfile
        platforms: ${{ matrix.platform }}
        outputs: type=image,name=techneut92/globalprotect-openconnect-dw,push-by-digest=true,name-canonical=true,push=true
    - name: Verify CLI tools
      env:
        IMAGE: techneut92/globalprotect-openconnect-dw
        DIGEST: ${{ steps.build.outputs.digest }}
      run: |
        docker run --rm "$IMAGE@$DIGEST" --help
        docker run --rm --entrypoint gpauth "$IMAGE@$DIGEST" --help
        docker run --rm --entrypoint sh "$IMAGE@$DIGEST" -lc 'test "$(id -u gp)" = "1000" && test "$SUDO_UID" = "1000"'
    - name: Export digest
      run: |
        mkdir -p /tmp/digests
        digest="${{ steps.build.outputs.digest }}"
        touch "/tmp/digests/${digest#sha256:}"
    - name: Upload digest
      uses: actions/upload-artifact@v7
      with:
        name: digests-${{ env.PLATFORM_PAIR }}
        path: /tmp/digests/*
        if-no-files-found: error
        retention-days: 1

  # Build a single-file Flatpak bundle of the GUI. The artifact is named
  # `artifact-gp-flatpak` so the release script's `artifact-gp-*` glob ships it.
  flatpak:
    if: ${{ github.event_name == 'workflow_dispatch' || startsWith(github.ref, 'refs/tags/') }}
    runs-on: ubuntu-latest
    container:
      image: ghcr.io/flathub-infra/flatpak-github-actions:gnome-48
      options: --privileged
    steps:
      - name: Checkout
        uses: actions/checkout@v6
      - name: Build Flatpak bundle
        uses: flatpak/flatpak-github-actions/flatpak-builder@v6
        with:
          bundle: io.github.techneut92.gpgui.flatpak
          manifest-path: apps/gpgui/packaging/flatpak/io.github.techneut92.gpgui.yml
          # GNOME 50 runtime/SDK + rust-stable//25.08 are pulled from Flathub by
          # the action (the image ships an older runtime only).
          cache-key: flatpak-builder-${{ github.sha }}
      - name: Upload bundle
        uses: actions/upload-artifact@v7
        with:
          name: artifact-gp-flatpak
          path: io.github.techneut92.gpgui.flatpak
          if-no-files-found: error

  gh-release:
    if: ${{ github.event_name == 'workflow_dispatch' || startsWith(github.ref, 'refs/tags/') }}
    runs-on: ubuntu-latest
    needs:
      - tarball
      - tarball-offline
      - build-gp
      - rpm-install-test
      - deb-install-test
      - flatpak

    steps:
    - name: Prepare workspace
      run: rm -rf gh-release && mkdir gh-release

    - name: Checkout GlobalProtect-openconnect
      uses: actions/checkout@v6
      with:
        token: ${{ github.token }}
        repository: techneut92/GlobalProtect-openconnect-dw
        ref: ${{ github.event_name == 'workflow_dispatch' && inputs.gp_branch || github.ref }}
        path: gh-release/gp
        submodules: recursive

    - name: Download all artifacts
      uses: actions/download-artifact@v8
      with:
        path: gh-release/gp/.build/artifacts

    - name: Rename APK artifacts
      run: |
        shopt -s nullglob

        for file in gh-release/gp/.build/artifacts/artifact-gp-apk-amd64/*.apk; do
          mv "$file" "${file%.apk}-x86_64.apk"
        done
        for file in gh-release/gp/.build/artifacts/artifact-gp-apk-ubuntu-24.04-arm/*.apk; do
          mv "$file" "${file%.apk}-aarch64.apk"
        done

    - name: Create GH release
      env:
        GH_TOKEN: ${{ github.token }}
        RELEASE_TAG: ${{ github.event_name == 'workflow_dispatch' && 'snapshot' || github.ref_name }}
      run: |
        cd gh-release/gp/scripts && ./gh-release.sh "$RELEASE_TAG"

  publish-docker-image:
    # Disabled: publishes the multi-arch image manifest to Docker Hub (needs
    # DOCKER_HUB_USERNAME/TOKEN secrets). Re-enable alongside build-docker-image.
    if: false
    needs:
      - build-docker-image
    runs-on: ubuntu-latest
    steps:
    - name: Download digests
      uses: actions/download-artifact@v8
      with:
        path: /tmp/digests
        pattern: digests-*
        merge-multiple: true
    - name: Set up Docker Buildx
      uses: docker/setup-buildx-action@v4
    - name: Login to Docker Hub
      uses: docker/login-action@v4
      with:
        username: ${{ secrets.DOCKER_HUB_USERNAME }}
        password: ${{ secrets.DOCKER_HUB_TOKEN }}
    - name: Publish Docker manifest
      working-directory: /tmp/digests
      env:
        IMAGE: techneut92/globalprotect-openconnect-dw
        RELEASE_TAG: ${{ github.event_name == 'workflow_dispatch' && 'snapshot' || github.ref_name }}
      run: |
        docker buildx imagetools create -t "$IMAGE:$RELEASE_TAG" \
          $(printf "$IMAGE@sha256:%s " *)

        docker buildx imagetools inspect "$IMAGE:$RELEASE_TAG"

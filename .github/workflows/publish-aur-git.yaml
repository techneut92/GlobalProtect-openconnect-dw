name: Publish AUR git package

on:
  workflow_dispatch:
    inputs:
      build-package:
        type: boolean
        description: "Build the package before publishing"
        required: true
        default: true
      publish:
        type: boolean
        description: "Push PKGBUILD, .SRCINFO, and gp.install to AUR"
        required: true
        default: true
  push:
    branches:
      - main
    paths:
      - packaging/aur/globalprotect-openconnect-git/**
      - .github/workflows/publish-aur-git.yaml

permissions:
  contents: read

jobs:
  aur:
    runs-on: ubuntu-latest
    container: archlinux:base-devel
    defaults:
      run:
        shell: bash
    env:
      AUR_PACKAGE_DIR: packaging/aur/globalprotect-openconnect-git
      AUR_REPO: ssh://aur@aur.archlinux.org/globalprotect-openconnect-git.git
    steps:
      - name: Install checkout tools
        run: pacman -Syu --noconfirm --needed git openssh

      - name: Checkout GlobalProtect-openconnect
        uses: actions/checkout@v6

      - name: Install build tools
        run: |
          pacman -Syu --noconfirm --needed \
            appmenu-gtk-module \
            cargo \
            curl \
            desktop-file-utils \
            file \
            git \
            jq \
            libappindicator-gtk3 \
            libsecret \
            libxml2 \
            namcap \
            openconnect \
            openssh \
            openssl \
            pkgconf \
            librsvg \
            shared-mime-info \
            vpnc \
            wget \
            webkit2gtk-4.1

      - name: Prepare build user
        run: |
          useradd -m builder
          chown -R builder:builder "$GITHUB_WORKSPACE"

      - name: Refresh VCS package version
        if: ${{ github.event_name == 'workflow_dispatch' }}
        run: |
          cd "$AUR_PACKAGE_DIR"
          runuser -u builder -- makepkg --nobuild --noconfirm --cleanbuild

      - name: Regenerate .SRCINFO
        run: |
          cd "$AUR_PACKAGE_DIR"
          runuser -u builder -- makepkg --printsrcinfo > .SRCINFO

      - name: Check committed .SRCINFO
        if: ${{ github.event_name == 'push' }}
        run: |
          git -C "$GITHUB_WORKSPACE" diff --exit-code -- "$AUR_PACKAGE_DIR/.SRCINFO"

      - name: Run namcap
        run: |
          cd "$AUR_PACKAGE_DIR"
          runuser -u builder -- namcap PKGBUILD .SRCINFO

      - name: Build package
        if: ${{ github.event_name == 'workflow_dispatch' && inputs['build-package'] }}
        run: |
          cd "$AUR_PACKAGE_DIR"
          runuser -u builder -- makepkg --noconfirm --clean --cleanbuild

      - name: Configure SSH
        if: ${{ github.event_name == 'workflow_dispatch' && inputs.publish }}
        env:
          AUR_SSH_PRIVATE_KEY: ${{ secrets.AUR_SSH_PRIVATE_KEY }}
        run: |
          if [[ -z "$AUR_SSH_PRIVATE_KEY" ]]; then
            echo "AUR_SSH_PRIVATE_KEY is required to publish to AUR" >&2
            exit 1
          fi

          install -d -m 700 ~/.ssh
          printf '%s\n' "$AUR_SSH_PRIVATE_KEY" > ~/.ssh/aur
          chmod 600 ~/.ssh/aur
          ssh-keyscan aur.archlinux.org >> ~/.ssh/known_hosts
          printf '%s\n' \
            "Host aur.archlinux.org" \
            "  IdentityFile ~/.ssh/aur" \
            "  User aur" \
            "  StrictHostKeyChecking yes" \
            > ~/.ssh/config

      - name: Publish to AUR
        if: ${{ github.event_name == 'workflow_dispatch' && inputs.publish }}
        run: |
          workdir="$(mktemp -d)"
          git clone "$AUR_REPO" "$workdir/aur"

          cp "$AUR_PACKAGE_DIR"/PKGBUILD "$workdir/aur/PKGBUILD"
          cp "$AUR_PACKAGE_DIR"/.SRCINFO "$workdir/aur/.SRCINFO"
          cp "$AUR_PACKAGE_DIR"/gp.install "$workdir/aur/gp.install"

          cd "$workdir/aur"
          if git diff --quiet; then
            echo "AUR package is already up to date"
            exit 0
          fi

          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add PKGBUILD .SRCINFO gp.install
          git commit -m "Update globalprotect-openconnect-git"
          git push origin master

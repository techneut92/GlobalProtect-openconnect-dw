name: COPR (manual)

# Manual / ad-hoc COPR rebuilds (e.g. to rebuild against a newly added Fedora
# chroot without cutting a release). The RELEASE flow is handled by the
# `copr-publish` job in build.yaml, which is gated on the rpm-install-test so a
# package that fails the smoke test is never published — do NOT add a tag
# trigger here or releases would publish to COPR twice (and ungated).
on:
  workflow_dispatch:

concurrency:
  group: copr-${{ github.ref }}
  cancel-in-progress: false

env:
  # owner/project on copr.fedorainfracloud.org — change the owner if your COPR
  # username differs from the GitHub one.
  COPR_PROJECT: techneut92/globalprotect-openconnect-dw

jobs:
  copr-build:
    runs-on: ubuntu-latest
    container:
      image: registry.fedoraproject.org/fedora:latest
    steps:
      - name: Install tooling
        run: |
          dnf -y install --setopt=install_weak_deps=False \
            git rpm-build rpmdevtools cargo make xz tar gzip findutils copr-cli

      - name: Checkout (with submodules)
        uses: actions/checkout@v6
        with:
          submodules: recursive

      - name: Trust the workspace (container checkout)
        run: git config --global --add safe.directory "$GITHUB_WORKSPACE"

      - name: Build offline source RPM
        run: make srpm OFFLINE=1

      - name: Configure copr-cli
        env:
          COPR_CONFIG: ${{ secrets.COPR_CONFIG }}
        run: |
          if [ -z "$COPR_CONFIG" ]; then
            echo "::error::COPR_CONFIG secret is not set — add your ~/.config/copr token block as a repo secret."
            exit 1
          fi
          mkdir -p ~/.config
          printf '%s\n' "$COPR_CONFIG" > ~/.config/copr
          chmod 600 ~/.config/copr

      - name: Submit build to COPR
        run: |
          srpm=$(ls .build/rpm/*.src.rpm)
          echo "Submitting $srpm to $COPR_PROJECT (builds all project chroots)"
          copr-cli build "$COPR_PROJECT" "$srpm"
